<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lapangan Lari HUT RI 81</title>
  <style>
    :root{
      --merah:#d60000;
      --merah-gelap:#970000;
      --putih:#ffffff;
      --emas:#d99a00;
      --rumput-1:#4f9d1e;
      --rumput-2:#7fc43b;
      --langit-1:#0568db;
      --langit-2:#18a7ff;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      width:100%;
      min-height:100%;
      font-family:Arial, Helvetica, sans-serif;
      background:#064fb1;
      overflow-x:hidden;
    }

    body{
      color:#fff;
    }

    .scene{
      position:relative;
      width:100%;
      min-height:100vh;
      overflow:hidden;
      background:
        linear-gradient(to bottom, var(--langit-1) 0%, var(--langit-2) 42%, #76d7ff 58%, #6dbc33 59%, #347f13 100%);
      isolation:isolate;
    }

    /* LANGIT */
    .sun-glow{
      position:absolute;
      top:-180px;
      left:50%;
      width:700px;
      height:700px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.38), rgba(255,255,255,0) 68%);
      z-index:-1;
    }

    .cloud{
      position:absolute;
      width:210px;
      height:70px;
      border-radius:999px;
      background:#fff;
      filter:drop-shadow(0 8px 10px rgba(0,80,160,.18));
      opacity:.96;
      animation:cloudMove 22s linear infinite;
      z-index:1;
    }

    .cloud::before,
    .cloud::after{
      content:"";
      position:absolute;
      border-radius:50%;
      background:#fff;
    }

    .cloud::before{
      width:90px;
      height:90px;
      left:28px;
      top:-42px;
    }

    .cloud::after{
      width:120px;
      height:120px;
      right:20px;
      top:-64px;
    }

    .cloud.c1{top:70px;left:-40px;transform:scale(.9);}
    .cloud.c2{top:115px;right:-30px;transform:scale(.7);animation-duration:29s;}
    .cloud.c3{top:260px;left:12%;transform:scale(.5);animation-duration:34s;}

    @keyframes cloudMove{
      0%{translate:-20px 0;}
      50%{translate:35px 0;}
      100%{translate:-20px 0;}
    }

    /* UMBUL-UMBUL */
    .bunting{
      position:absolute;
      left:-3%;
      width:106%;
      height:56px;
      z-index:5;
      pointer-events:none;
    }

    .bunting.top{top:145px;transform:rotate(-1deg);}
    .bunting.middle{top:525px;transform:scale(.9);opacity:.96;}
    .bunting.bottom{top:660px;transform:scale(.75);opacity:.95;}

    .rope{
      position:absolute;
      left:0;
      right:0;
      top:6px;
      height:4px;
      background:#8c2c1e;
      box-shadow:0 2px 0 rgba(255,255,255,.45);
      transform:skewY(3deg);
      transform-origin:center;
    }

    .flags{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:space-around;
      align-items:flex-start;
      padding:6px 10px 0;
    }

    .flag{
      width:0;
      height:0;
      border-left:13px solid transparent;
      border-right:13px solid transparent;
      border-top:34px solid var(--putih);
      filter:drop-shadow(0 3px 2px rgba(0,0,0,.25));
      transform-origin:top center;
      animation:flagWave 1.8s ease-in-out infinite alternate;
    }

    .flag:nth-child(odd){border-top-color:var(--merah);}
    .flag:nth-child(3n){animation-delay:.25s;}
    .flag:nth-child(4n){animation-delay:.5s;}

    @keyframes flagWave{
      from{transform:rotate(-4deg) skewX(-2deg);}
      to{transform:rotate(4deg) skewX(2deg);}
    }

    /* POHON */
    .tree-line{
      position:absolute;
      left:0;
      right:0;
      top:530px;
      height:250px;
      z-index:2;
      overflow:hidden;
    }

    .tree{
      position:absolute;
      bottom:0;
      width:130px;
      height:210px;
    }

    .tree .trunk{
      position:absolute;
      left:56px;
      bottom:0;
      width:20px;
      height:120px;
      background:linear-gradient(90deg,#6d3310,#a75a20,#5b280b);
      border-radius:12px;
    }

    .tree .leaf{
      position:absolute;
      width:88px;
      height:88px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%, #67bd28, #1d6f13 74%);
      box-shadow:
        48px 10px 0 #2c8119,
        -46px 20px 0 #237518,
        18px -40px 0 #328d1b,
        -20px -35px 0 #429b21;
    }

    .tree.t1{left:-25px;transform:scale(1.15);}
    .tree.t2{left:140px;transform:scale(.88);}
    .tree.t3{right:130px;transform:scale(.92);}
    .tree.t4{right:-40px;transform:scale(1.2);}

    /* GERBANG */
    .gate{
      position:relative;
      z-index:10;
      width:min(860px, 92vw);
      margin:245px auto 0;
      text-align:center;
    }

    .poles{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .pole{
      position:absolute;
      top:55px;
      width:26px;
      height:470px;
      border-radius:15px;
      background:
        repeating-linear-gradient(
          135deg,
          var(--putih) 0 23px,
          var(--merah) 23px 46px
        );
      border:4px solid #b47a00;
      box-shadow:0 0 0 3px #f7c84d, 0 8px 18px rgba(0,0,0,.3);
    }

    .pole::before{
      content:"";
      position:absolute;
      width:34px;
      height:34px;
      left:50%;
      top:-26px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle at 35% 28%, #fff6a9, #e6a000 45%, #9f5b00 78%);
      box-shadow:0 4px 6px rgba(0,0,0,.3);
    }

    .pole.left{left:4%;}
    .pole.right{right:4%;}

    .main-banner{
      position:relative;
      width:83%;
      margin:0 auto;
      padding:24px 18px 16px;
      border-radius:8px 8px 26px 26px;
      background:
        linear-gradient(to bottom, #fff 0 62%, var(--merah) 62% 100%);
      border:5px solid #eee1ce;
      box-shadow:0 18px 28px rgba(0,0,0,.28);
      transform:perspective(900px) rotateX(2deg);
    }

    .main-banner h1{
      font-size:clamp(30px, 5.7vw, 68px);
      line-height:.95;
      letter-spacing:1px;
      color:#ad0606;
      text-transform:uppercase;
      text-shadow:0 4px 0 #fff, 0 7px 7px rgba(0,0,0,.25);
    }

    .main-banner .hut{
      margin-top:17px;
      font-size:clamp(22px, 3.5vw, 43px);
      font-weight:900;
      color:#fff;
      letter-spacing:2px;
      text-shadow:0 3px 4px rgba(0,0,0,.35);
    }

    .brand-box{
      width:min(420px, 64vw);
      margin:28px auto 0;
      padding:12px 18px;
      border:7px solid #a66b00;
      border-radius:18px;
      color:#48a900;
      background:linear-gradient(#fffefb,#ece7dc);
      box-shadow:
        0 0 0 4px #f6bd31,
        0 12px 25px rgba(0,0,0,.35),
        inset 0 0 28px rgba(190,140,0,.17);
      font-size:clamp(26px, 4.5vw, 52px);
      font-weight:1000;
      letter-spacing:1px;
      text-shadow:0 2px 0 #1d5500;
    }

    .brand-box span{
      color:#ff6200;
      margin-right:6px;
    }

    /* TENDA */
    .tent{
      position:absolute;
      top:735px;
      width:220px;
      height:190px;
      z-index:6;
      filter:drop-shadow(0 12px 12px rgba(0,0,0,.28));
    }

    .tent.left{left:-15px;}
    .tent.right{right:-15px;transform:scaleX(-1);}

    .tent-top{
      width:100%;
      height:85px;
      clip-path:polygon(10% 100%, 0 38%, 20% 0, 52% 18%, 82% 0, 100% 45%, 92% 100%);
      background:
        repeating-linear-gradient(
          90deg,
          var(--merah) 0 34px,
          var(--putih) 34px 68px
        );
      border-bottom:9px solid #8d0000;
    }

    .tent-body{
      width:92%;
      height:105px;
      margin:auto;
      background:
        repeating-linear-gradient(
          to bottom,
          var(--merah) 0 18px,
          var(--putih) 18px 35px
        );
      border:5px solid #8d0000;
      border-top:0;
    }

    .tent-text{
      position:absolute;
      left:22px;
      top:92px;
      width:170px;
      font-weight:900;
      font-size:18px;
      text-align:center;
      text-transform:uppercase;
      color:#fff;
      text-shadow:0 2px 2px rgba(0,0,0,.35);
    }

    /* LAPANGAN */
    .arena{
      position:relative;
      z-index:4;
      width:100%;
      height:860px;
      margin-top:165px;
      perspective:900px;
      overflow:hidden;
    }

    .track{
      position:absolute;
      left:50%;
      top:-100px;
      width:min(660px, 82vw);
      height:1120px;
      transform:translateX(-50%) rotateX(58deg);
      transform-origin:top center;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 calc(20% - 3px),
          rgba(255,255,255,.92) calc(20% - 3px) calc(20% + 3px)
        ),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.045) 0 10px,
          rgba(0,0,0,.025) 10px 20px
        ),
        linear-gradient(90deg, var(--rumput-1), var(--rumput-2), var(--rumput-1));
      border-left:8px solid rgba(255,255,255,.86);
      border-right:8px solid rgba(255,255,255,.86);
      box-shadow:
        inset 0 0 60px rgba(0,0,0,.22),
        0 0 0 18px #3f8619,
        0 20px 50px rgba(0,0,0,.35);
    }

    .track::before{
      content:"";
      position:absolute;
      left:-7%;
      right:-7%;
      top:760px;
      height:72px;
      background:
        conic-gradient(#fff 25%, #111 0 50%, #fff 0 75%, #111 0) 0 0/44px 44px;
      border-top:5px solid #fff;
      border-bottom:5px solid #fff;
      box-shadow:0 8px 12px rgba(0,0,0,.25);
    }

    .track::after{
      content:"START";
      position:absolute;
      left:50%;
      top:845px;
      transform:translateX(-50%) rotateX(-58deg);
      font-size:42px;
      font-weight:1000;
      color:rgba(255,255,255,.72);
      letter-spacing:8px;
      text-shadow:0 4px 4px rgba(0,0,0,.35);
    }

    /* PAGAR */
    .side-rail{
      position:absolute;
      top:45px;
      width:24%;
      height:710px;
      z-index:8;
      pointer-events:none;
    }

    .side-rail.left{left:0;}
    .side-rail.right{right:0;transform:scaleX(-1);}

    .rail-post{
      position:absolute;
      bottom:0;
      width:8px;
      height:420px;
      border-radius:4px;
      background:linear-gradient(#ffd26a,#a66100);
      box-shadow:0 0 0 2px #f9b400;
    }

    .rail-post::before{
      content:"";
      position:absolute;
      left:50%;
      top:-10px;
      width:14px;
      height:14px;
      transform:translateX(-50%);
      border-radius:50%;
      background:#ffc328;
    }

    .rail-line{
      position:absolute;
      left:0;
      right:0;
      height:9px;
      border-radius:99px;
      background:#d39a16;
      box-shadow:0 2px 0 #6f4300;
    }

    .rail-line.r1{bottom:285px;transform:rotate(15deg);}
    .rail-line.r2{bottom:180px;transform:rotate(9deg);}
    .rail-line.r3{bottom:80px;transform:rotate(4deg);}

    .side-banner{
      position:absolute;
      bottom:150px;
      width:230px;
      padding:18px 16px;
      border:4px solid #8a0000;
      background:linear-gradient(#e71818,#a90000);
      font-size:22px;
      font-weight:1000;
      line-height:1.05;
      text-transform:uppercase;
      box-shadow:0 9px 18px rgba(0,0,0,.25);
    }

    .side-banner.left{
      left:1.8%;
      transform:rotate(-3deg);
    }

    .side-banner.right{
      right:1.8%;
      transform:rotate(3deg);
      font-size:30px;
      text-align:center;
    }

    /* PELARI */
    .runners{
      position:absolute;
      left:50%;
      top:390px;
      width:min(620px, 78vw);
      height:330px;
      transform:translateX(-50%);
      z-index:12;
      pointer-events:none;
    }

    .runner{
      position:absolute;
      bottom:0;
      width:62px;
      height:95px;
      transition:transform .1s linear;
      filter:drop-shadow(0 8px 5px rgba(0,0,0,.28));
    }

    .runner .head{
      position:absolute;
      left:50%;
      top:0;
      width:30px;
      height:30px;
      transform:translateX(-50%);
      border-radius:50%;
      background:#f2b679;
      border:3px solid #5f250e;
    }

    .runner .body{
      position:absolute;
      left:50%;
      top:26px;
      width:38px;
      height:38px;
      transform:translateX(-50%);
      border-radius:12px 12px 8px 8px;
      background:#ef1c24;
      border:3px solid #8b0000;
    }

    .runner .sack{
      position:absolute;
      left:50%;
      top:54px;
      width:54px;
      height:45px;
      transform:translateX(-50%);
      border-radius:9px 9px 17px 17px;
      background:linear-gradient(90deg,#b98547,#e7c48b,#9c6b33);
      border:3px solid #71421d;
    }

    .runner.r1{left:5%;}
    .runner.r2{left:27%;}
    .runner.r3{left:49%;}
    .runner.r4{left:71%;}
    .runner.r5{left:91%;}

    .runner.r2 .body{background:#155fd6;border-color:#063d9c;}
    .runner.r3 .body{background:#f4df14;border-color:#8d7a00;}
    .runner.r4 .body{background:#11a349;border-color:#05672b;}
    .runner.r5 .body{background:#8f35d6;border-color:#5e168d;}

    .runner.hopping{
      animation:hop .48s ease-in-out infinite;
    }

    @keyframes hop{
      0%,100%{translate:0 0;rotate:-2deg;}
      50%{translate:0 -28px;rotate:3deg;}
    }

    /* KONTROL */
    .controls{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      z-index:50;
      padding:10px;
      border-radius:18px;
      background:rgba(0,0,0,.38);
      backdrop-filter:blur(8px);
      box-shadow:0 10px 25px rgba(0,0,0,.35);
    }

    button{
      border:0;
      border-radius:12px;
      padding:12px 18px;
      font-weight:900;
      font-size:15px;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(#ee2828,#ae0000);
      box-shadow:0 5px 0 #680000;
    }

    button:active{
      transform:translateY(4px);
      box-shadow:0 1px 0 #680000;
    }

    .status{
      position:absolute;
      left:50%;
      top:22px;
      transform:translateX(-50%);
      z-index:30;
      min-width:220px;
      padding:11px 18px;
      border:2px solid rgba(255,255,255,.8);
      border-radius:999px;
      background:rgba(0,0,0,.38);
      backdrop-filter:blur(6px);
      text-align:center;
      font-size:15px;
      font-weight:900;
      letter-spacing:.5px;
    }

    /* RESPONSIVE */
    @media (max-width:720px){
      .gate{margin-top:220px;}
      .main-banner{width:88%;padding:18px 12px 12px;}
      .brand-box{margin-top:22px;}
      .pole{height:390px;width:20px;}
      .tent{top:680px;width:145px;height:145px;}
      .tent-body{height:78px;}
      .tent-text{top:68px;left:12px;width:120px;font-size:12px;}
      .arena{margin-top:105px;height:790px;}
      .track{width:84vw;height:1050px;}
      .tree-line{top:470px;}
      .side-banner{width:120px;font-size:13px;padding:10px 8px;}
      .side-banner.right{font-size:17px;}
      .runners{top:365px;}
      .runner{transform:scale(.72);}
      .controls{bottom:10px;}
      button{padding:10px 14px;font-size:13px;}
    }

    @media (max-width:430px){
      .cloud{transform:scale(.55);}
      .bunting.top{top:132px;}
      .gate{margin-top:190px;}
      .pole.left{left:1%;}
      .pole.right{right:1%;}
      .main-banner{width:91%;}
      .main-banner h1{font-size:32px;}
      .main-banner .hut{font-size:22px;}
      .brand-box{width:66vw;font-size:26px;}
      .arena{margin-top:90px;}
      .side-banner{display:none;}
      .tent{top:635px;}
      .track{top:-70px;}
      .runners{top:355px;}
    }
  </style>
</head>
<body>
  <main class="scene" id="scene">
    <div class="sun-glow"></div>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>

    <div class="status" id="statusText">Lapangan siap digunakan</div>

    <div class="bunting top">
      <div class="rope"></div>
      <div class="flags" id="flagsTop"></div>
    </div>

    <div class="tree-line">
      <div class="tree t1"><div class="trunk"></div><div class="leaf"></div></div>
      <div class="tree t2"><div class="trunk"></div><div class="leaf"></div></div>
      <div class="tree t3"><div class="trunk"></div><div class="leaf"></div></div>
      <div class="tree t4"><div class="trunk"></div><div class="leaf"></div></div>
    </div>

    <section class="gate">
      <div class="poles">
        <div class="pole left"></div>
        <div class="pole right"></div>
      </div>

      <div class="main-banner">
        <h1>Raja Balap<br>Karung Sultan</h1>
        <div class="hut">— HUT RI 81 —</div>
      </div>

      <div class="brand-box"><span>◈</span>CERIABET</div>
    </section>

    <div class="bunting middle">
      <div class="rope"></div>
      <div class="flags" id="flagsMiddle"></div>
    </div>

    <div class="bunting bottom">
      <div class="rope"></div>
      <div class="flags" id="flagsBottom"></div>
    </div>

    <div class="tent left">
      <div class="tent-top"></div>
      <div class="tent-body"></div>
      <div class="tent-text">Dirgahayu Republik Indonesia</div>
    </div>

    <div class="tent right">
      <div class="tent-top"></div>
      <div class="tent-body"></div>
    </div>

    <section class="arena">
      <div class="track"></div>

      <div class="side-rail left" id="railLeft">
        <div class="rail-line r1"></div>
        <div class="rail-line r2"></div>
        <div class="rail-line r3"></div>
      </div>

      <div class="side-rail right" id="railRight">
        <div class="rail-line r1"></div>
        <div class="rail-line r2"></div>
        <div class="rail-line r3"></div>
      </div>

      <div class="side-banner left">Terus Melaju<br>Untuk Indonesia Maju</div>
      <div class="side-banner right">Merdeka !!!</div>

      <div class="runners" id="runners">
        <div class="runner r1"><div class="head"></div><div class="body"></div><div class="sack"></div></div>
        <div class="runner r2"><div class="head"></div><div class="body"></div><div class="sack"></div></div>
        <div class="runner r3"><div class="head"></div><div class="body"></div><div class="sack"></div></div>
        <div class="runner r4"><div class="head"></div><div class="body"></div><div class="sack"></div></div>
        <div class="runner r5"><div class="head"></div><div class="body"></div><div class="sack"></div></div>
      </div>
    </section>

    <div class="controls">
      <button id="startBtn">Mulai Lomba</button>
      <button id="resetBtn">Reset</button>
    </div>
  </main>

  <script>
    function createFlags(containerId, total){
      const container = document.getElementById(containerId);
      for(let i=0;i<total;i++){
        const flag = document.createElement("span");
        flag.className = "flag";
        container.appendChild(flag);
      }
    }

    createFlags("flagsTop", 24);
    createFlags("flagsMiddle", 26);
    createFlags("flagsBottom", 30);

    function createRailPosts(targetId, total){
      const rail = document.getElementById(targetId);
      for(let i=0;i<total;i++){
        const post = document.createElement("span");
        post.className = "rail-post";
        post.style.left = `${i * (100/(total-1))}%`;
        post.style.height = `${150 + i * 40}px`;
        rail.appendChild(post);
      }
    }

    createRailPosts("railLeft", 7);
    createRailPosts("railRight", 7);

    const runners = [...document.querySelectorAll(".runner")];
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");

    let raceFrame = null;
    let raceStarted = false;
    let startTime = 0;
    let speeds = [];
    let finished = false;

    function resetRace(){
      cancelAnimationFrame(raceFrame);
      raceStarted = false;
      finished = false;
      startTime = 0;
      statusText.textContent = "Lapangan siap digunakan";

      runners.forEach((runner)=>{
        runner.classList.remove("hopping");
        runner.style.transform = "translateY(0px)";
      });
    }

    function startRace(){
      if(raceStarted) return;

      resetRace();
      raceStarted = true;
      finished = false;
      startTime = performance.now();

      speeds = runners.map(()=> 0.045 + Math.random() * 0.035);
      runners.forEach(runner => runner.classList.add("hopping"));
      statusText.textContent = "Balapan dimulai!";

      function animate(now){
        const elapsed = now - startTime;
        let winner = -1;

        runners.forEach((runner, index)=>{
          const distance = Math.min(315, elapsed * speeds[index]);
          runner.style.transform = `translateY(${-distance}px)`;

          if(distance >= 315 && winner === -1){
            winner = index;
          }
        });

        if(winner >= 0 && !finished){
          finished = true;
          raceStarted = false;
          runners.forEach(runner => runner.classList.remove("hopping"));
          statusText.textContent = `Peserta ${winner + 1} menjadi pemenang!`;
          return;
        }

        raceFrame = requestAnimationFrame(animate);
      }

      raceFrame = requestAnimationFrame(animate);
    }

    startBtn.addEventListener("click", startRace);
    resetBtn.addEventListener("click", resetRace);
  </script>
</body>
