  function linkCard(icon,title,url){return `<div class="link-card"><div class="link-icon">${icon}</div><div class="link-main"><b>${title}</b><span>${esc(url)}</span></div><button class="chip" data-copy="${esc(url)}">Salin</button></div>`}

  function adminsTable(){const rows=state.admins.map(a=>`<tr><td><b>${esc(a.name)}</b></td><td>${esc(a.email)}</td><td><span class="badge ${a.role==='super_admin'?'warn':'active'}">${a.role==='super_admin'?'Super Admin':'Admin Kedua'}</span></td><td>${esc(a.status)}</td><td>${a.role==='super_admin'?'<span class="muted">Protected</span>':`<div class="table-actions"><button class="chip" data-edit-admin="${a.id}">Edit</button><button class="chip danger" data-delete-admin="${a.id}">Hapus</button></div>`}</td></tr>`).join('');return table(['Nama','Email','Role','Status','Aksi'],rows)}

  function bindPage(page){
    qsa('[data-go]').forEach(b=>b.onclick=()=>{currentPage=b.dataset.go;qsa('[data-page]').forEach(x=>x.classList.toggle('active',x.dataset.page===currentPage));showPage(currentPage)});qsa('[data-copy]').forEach(b=>b.onclick=async()=>{try{await navigator.clipboard.writeText(b.dataset.copy);toast('Link berhasil disalin.','success')}catch{toast('Salin manual dari kolom link.','error')}});
    bindCommonActions();
    if(page==='members')bindMembers();if(page==='games')bindGames();if(page==='prizes')bindPrizes();if(page==='design')bindDesign();if(page==='admins')bindAdmins();if(page==='permissions')bindPermissions();if(page==='settings')bindSettings();if(page==='account')bindAccount();
  }
  function bindCommonActions(){
    qsa('[data-ticket-member]').forEach(b=>b.onclick=()=>changeTicket(b.dataset.ticketMember,Number(b.dataset.delta)));
    qsa('[data-set-ticket]').forEach(b=>b.onclick=()=>{const m=state.members.find(x=>x.id===b.dataset.setTicket);const n=prompt('Masukkan jumlah tiket baru:',m.tickets);if(n!==null&&!Number.isNaN(Number(n))){const old=m.tickets;m.tickets=Math.max(0,Number(n));logActivity(`Tiket ${m.userId} diubah dari ${old} menjadi ${m.tickets}.`,'ticket');logAudit('SET_TICKET',`${m.userId}: ${old} -> ${m.tickets}`);saveState();showPage(currentPage)}})
  }
  function changeTicket(id,delta){const m=state.members.find(x=>x.id===id);if(!m)return;const old=Number(m.tickets)||0;m.tickets=Math.max(0,old+delta);logActivity(`Tiket ${m.userId} ${delta>=0?'ditambah':'dikurangi'} ${Math.abs(delta)}.`,'ticket');logAudit('UPDATE_TICKET',`${m.userId}: ${old} -> ${m.tickets}`);saveState();showPage(currentPage)}
  function bindMembers(){
    qs('#memberForm').onsubmit=e=>{e.preventDefault();const id=qs('#memberId').value,userId=qs('#memberUserId').value.trim().toUpperCase();if(state.members.some(m=>m.userId===userId&&m.id!==id)){toast('User ID sudah digunakan.','error');return}const data={userId,name:qs('#memberName').value.trim(),gameId:qs('#memberGame').value,tickets:Math.max(0,Number(qs('#memberTickets').value)),status:qs('#memberStatus').value,expiresAt:qs('#memberExpires').value?new Date(qs('#memberExpires').value).toISOString():'',notes:qs('#memberNotes').value.trim()};if(id){Object.assign(state.members.find(m=>m.id===id),data);logAudit('UPDATE_MEMBER',userId)}else{state.members.unshift({id:uid(),createdAt:now(),...data});logAudit('CREATE_MEMBER',userId)}logActivity(`Data member ${userId} disimpan.`,'member');saveState();showPage('members');toast('Data member berhasil disimpan.','success')};
    qsa('[data-edit-member]').forEach(b=>b.onclick=()=>{const m=state.members.find(x=>x.id===b.dataset.editMember);qs('#memberId').value=m.id;qs('#memberUserId').value=m.userId;qs('#memberName').value=m.name;qs('#memberGame').value=m.gameId;qs('#memberTickets').value=m.tickets;qs('#memberStatus').value=m.status;qs('#memberExpires').value=m.expiresAt?new Date(m.expiresAt).toISOString().slice(0,16):'';qs('#memberNotes').value=m.notes||'';scrollTo({top:0,behavior:'smooth'})});
    qsa('[data-delete-member]').forEach(b=>b.onclick=()=>{const m=state.members.find(x=>x.id===b.dataset.deleteMember);if(confirm(`Hapus member ${m.userId}?`)){state.members=state.members.filter(x=>x.id!==m.id);logAudit('DELETE_MEMBER',m.userId);saveState();showPage('members')}})
  }
  function bindGames(){
    qs('#gameForm').onsubmit=e=>{e.preventDefault();const id=qs('#gameId').value,data={name:qs('#gameName').value.trim(),code:qs('#gameCode').value.trim().toUpperCase(),slug:qs('#gameSlug').value.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-'),status:qs('#gameStatus').value,dailyLimit:Math.max(0,Number(qs('#gameLimit').value))};if(id)Object.assign(state.games.find(g=>g.id===id),data);else state.games.push({id:uid(),...data,startAt:'',endAt:''});logAudit(id?'UPDATE_GAME':'CREATE_GAME',data.name);saveState();showPage('games');toast('Game berhasil disimpan.','success')};
    qsa('[data-edit-game]').forEach(b=>b.onclick=()=>{const g=state.games.find(x=>x.id===b.dataset.editGame);qs('#gameId').value=g.id;qs('#gameName').value=g.name;qs('#gameCode').value=g.code;qs('#gameSlug').value=g.slug;qs('#gameStatus').value=g.status;qs('#gameLimit').value=g.dailyLimit;scrollTo({top:0,behavior:'smooth'})});
    qsa('[data-delete-game]').forEach(b=>b.onclick=()=>{const g=state.games.find(x=>x.id===b.dataset.deleteGame);if(state.games.length===1){toast('Minimal harus ada satu game.','error');return}if(confirm(`Hapus game ${g.name}?`)){state.games=state.games.filter(x=>x.id!==g.id);state.members.forEach(m=>{if(m.gameId===g.id)m.gameId=state.games[0].id});state.prizes=state.prizes.filter(p=>p.gameId!==g.id);saveState();showPage('games')}})
  }
  function bindPrizes(){
    qs('#prizeForm').onsubmit=e=>{e.preventDefault();const id=qs('#prizeId').value,data={gameId:qs('#prizeGame').value,name:qs('#prizeName').value.trim(),type:qs('#prizeType').value,value:Math.max(0,Number(qs('#prizeValue').value)),quota:Math.max(0,Number(qs('#prizeQuota').value)),weight:Math.max(0,Number(qs('#prizeWeight').value))};if(id)Object.assign(state.prizes.find(p=>p.id===id),data);else state.prizes.push({id:uid(),...data});logAudit(id?'UPDATE_PRIZE':'CREATE_PRIZE',data.name);saveState();showPage('prizes');toast('Hadiah berhasil disimpan.','success')};
    qsa('[data-edit-prize]').forEach(b=>b.onclick=()=>{const p=state.prizes.find(x=>x.id===b.dataset.editPrize);qs('#prizeId').value=p.id;qs('#prizeGame').value=p.gameId;qs('#prizeName').value=p.name;qs('#prizeType').value=p.type;qs('#prizeValue').value=p.value;qs('#prizeQuota').value=p.quota;qs('#prizeWeight').value=p.weight;scrollTo({top:0,behavior:'smooth'})});
    qsa('[data-delete-prize]').forEach(b=>b.onclick=()=>{const p=state.prizes.find(x=>x.id===b.dataset.deletePrize);if(confirm(`Hapus hadiah ${p.name}?`)){state.prizes=state.prizes.filter(x=>x.id!==p.id);saveState();showPage('prizes')}})
  }
  function bindDesign(){
    const ids=['themePrimary','themeSecondary','themeBackground','themeText','themeTitle','themeSubtitle','themeButton','themeAnimation','themeTicker','themeLogo','themeBgImage'];ids.forEach(id=>qs('#'+id).addEventListener('input',renderThemePreview));qsa('[data-color]').forEach(c=>c.oninput=()=>{qs('#'+c.dataset.color).value=c.value;renderThemePreview()});
    qs('#logoFile').onchange=e=>readImageFile(e.target.files[0],v=>{qs('#themeLogo').value=v;renderThemePreview()});qs('#bgFile').onchange=e=>readImageFile(e.target.files[0],v=>{qs('#themeBgImage').value=v;renderThemePreview()});
    qs('#publishTheme').onclick=()=>{state.theme={primary:qs('#themePrimary').value,secondary:qs('#themeSecondary').value,background:qs('#themeBackground').value,text:qs('#themeText').value,title:qs('#themeTitle').value,subtitle:qs('#themeSubtitle').value,buttonText:qs('#themeButton').value,ticker:qs('#themeTicker').value,logo:qs('#themeLogo').value,backgroundImage:qs('#themeBgImage').value,banner:'',animation:qs('#themeAnimation').value,publishedAt:now()};logActivity('Tema member dipublish.','design');logAudit('PUBLISH_THEME',state.theme.title);saveState();toast('Tema berhasil dipublish.','success');renderThemePreview()};
    qs('#resetTheme').onclick=()=>{if(confirm('Reset tema ke default?')){state.theme=defaultState().theme;saveState();showPage('design')}};renderThemePreview();
  }
  function readImageFile(file,cb){if(!file)return;if(file.size>2.5*1024*1024){toast('Ukuran gambar maksimal sekitar 2.5 MB untuk localStorage.','error');return}const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(file)}
  function renderThemePreview(){const get=id=>qs('#'+id)?.value||'';const bg=get('themeBgImage');qs('#themePreview').innerHTML=`<div class="preview-bg" style="background:${get('themeBackground')};background-image:url('${esc(bg)}')"></div><div class="preview-overlay"></div><div class="preview-content" style="color:${esc(get('themeText'))}">${get('themeLogo')?`<img class="preview-logo" src="${esc(get('themeLogo'))}" alt="Logo">`:'<div class="brand-mark preview-logo">CB</div>'}<h2 style="font-size:2.3rem;margin:16px 0 8px;color:${esc(get('themeText'))}">${esc(get('themeTitle'))}</h2><p>${esc(get('themeSubtitle'))}</p><button class="btn" style="align-self:flex-start;background:linear-gradient(135deg,${esc(get('themePrimary'))},${esc(get('themeSecondary'))});${get('themeAnimation')==='pulse'?'animation:pulse 1.8s infinite':''}">${esc(get('themeButton'))}</button></div>`}
  function bindAdmins(){
    qs('#adminForm').onsubmit=e=>{e.preventDefault();const id=qs('#adminId').value,email=qs('#adminEmail').value.trim().toLowerCase();if(state.admins.some(a=>a.email.toLowerCase()===email&&a.id!==id)){toast('Email admin sudah digunakan.','error');return}const data={name:qs('#adminName').value.trim(),email,password:qs('#adminPassword').value,status:qs('#adminStatus').value,role:'admin_second'};if(id)Object.assign(state.admins.find(a=>a.id===id),data);else state.admins.push({id:uid(),...data});logAudit(id?'UPDATE_ADMIN':'CREATE_ADMIN',email);saveState();showPage('admins');toast('Admin Kedua berhasil disimpan.','success')};
    qsa('[data-edit-admin]').forEach(b=>b.onclick=()=>{const a=state.admins.find(x=>x.id===b.dataset.editAdmin);qs('#adminId').value=a.id;qs('#adminName').value=a.name;qs('#adminEmail').value=a.email;qs('#adminPassword').value=a.password;qs('#adminStatus').value=a.status;scrollTo({top:0,behavior:'smooth'})});qsa('[data-delete-admin]').forEach(b=>b.onclick=()=>{const a=state.admins.find(x=>x.id===b.dataset.deleteAdmin);if(confirm(`Hapus admin ${a.name}?`)){state.admins=state.admins.filter(x=>x.id!==a.id);logAudit('DELETE_ADMIN',a.email);saveState();showPage('admins')}})
  }
  function bindPermissions(){qs('#savePermissions').onclick=()=>{state.permissions.admin_second=qsa('.permCheck:checked').map(x=>x.value);logAudit('UPDATE_PERMISSIONS',state.permissions.admin_second.join(', '));saveState();toast('Permission Admin Kedua disimpan.','success')}}
  function bindSettings(){
    qs('#settingsForm').onsubmit=e=>{e.preventDefault();state.settings.timezone=qs('#settingTimezone').value;state.settings.maintenance=qs('#settingMaintenance').value==='true';state.settings.maintenanceMessage=qs('#settingMessage').value;logAudit('UPDATE_SETTINGS',`Maintenance: ${state.settings.maintenance}`);saveState();toast('System Settings disimpan.','success')};
    qs('#exportData').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ceriabet-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)};
    qs('#importData').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(!x.admins||!x.members)throw Error();state=x;saveState();toast('Data berhasil diimport.','success');showPage('settings')}catch{toast('File JSON tidak valid.','error')}};r.readAsText(f)};
    qs('#resetAll').onclick=()=>{if(confirm('Yakin reset seluruh data demo? Tindakan ini tidak dapat dibatalkan.')){state=defaultState();saveState();saveSession(null);location.hash='';toast('Data demo direset.','success')}}
  }
  function bindAccount(){qs('#passwordForm').onsubmit=e=>{e.preventDefault();const a=state.admins.find(x=>x.id===session.id),p=qs('#newPassword').value,c=qs('#confirmPassword').value;if(p!==c){toast('Konfirmasi password tidak sama.','error');return}a.password=p;logAudit('CHANGE_PASSWORD',a.email);saveState();toast('Password berhasil diperbarui.','success');e.target.reset()}}

  function renderMemberLogin(){
    document.body.className='';const t=state.theme;qs('#app').innerHTML=`<main class="member-shell"><div class="member-bg" style="background-color:${esc(t.background)};background-image:url('${esc(t.backgroundImage)}')"></div><div class="member-overlay"></div><section class="card member-card" style="color:${esc(t.text)}"><div class="row between wrap"><div class="brand"><div class="brand-mark">CB</div><span>CERIABET EVENT</span></div><button class="btn secondary" id="backAdmin">Login Admin</button></div>${t.logo?`<img class="member-logo" src="${esc(t.logo)}" alt="Logo CERIABET">`:'<div class="member-logo">CB</div>'}<h1>${esc(t.title)}</h1><p class="muted">${esc(t.subtitle)}</p>${state.settings.maintenance?`<div class="notice error">${esc(state.settings.maintenanceMessage)}</div>`:`<form class="member-form" id="memberLoginForm"><input class="input" id="memberUserIdLogin" placeholder="Masukkan User ID" autocomplete="off" required><button class="btn" style="${t.animation==='pulse'?'animation:pulse 1.8s infinite':''}">${esc(t.buttonText)}</button></form><div class="notice hidden" id="memberLoginError" style="max-width:520px;margin:15px auto 0"></div>`}<div class="ticker"><span>${esc(t.ticker)}</span></div><div class="muted small" style="margin-top:16px">Demo User ID: CERIABET001 · Data tersimpan pada browser yang sama.</div></section></main>`;
    qs('#backAdmin').onclick=()=>location.hash='';if(!state.settings.maintenance)qs('#memberLoginForm').onsubmit=e=>{e.preventDefault();const id=qs('#memberUserIdLogin').value.trim().toUpperCase(),m=state.members.find(x=>x.userId===id);const err=qs('#memberLoginError');let msg='';if(!m)msg='User ID tidak ditemukan.';else if(m.status!=='active')msg='Akses member sedang nonaktif.';else if(m.expiresAt&&new Date(m.expiresAt)<new Date())msg='Masa aktif User ID sudah berakhir.';else if(Number(m.tickets)<=0)msg='Tiket bermain sudah habis.';else{const g=state.games.find(x=>x.id===m.gameId);if(!g||g.status!=='active')msg='Game sedang tidak aktif atau maintenance.'}if(msg){err.className='notice error';err.textContent=msg;return}saveSession({type:'member',id:m.id,userId:m.userId,name:m.name||m.userId,gameId:m.gameId});logActivity(`Member ${m.userId} login ke minigame.`,'login',m.userId);saveState();location.hash='game'};
  }
  function renderGame(){
    if(!session||session.type!=='member'){location.hash='member';return}const m=state.members.find(x=>x.id===session.id);if(!m){saveSession(null);location.hash='member';return}const g=state.games.find(x=>x.id===m.gameId);document.body.className='';qs('#app').innerHTML=`<main class="game-shell"><div class="game-top"><div><div class="brand"><div class="brand-mark">CB</div><span>${esc(g?.name||'MINIGAME')}</span></div><div class="muted small" style="margin-top:5px">Member: ${esc(m.userId)}</div></div><div class="row wrap"><span class="badge active">🎟 Tiket: <b id="ticketCount">${m.tickets}</b></span><button class="btn secondary" id="exitGame">Keluar</button></div></div><section class="card arena-card"><div class="arena"><div class="sun"></div><div class="cloud"></div><div class="crowd">${['🙌','🎉','👏','🥳','🇮🇩','🙌','🎊','👏','🥳','🇮🇩'].map(x=>`<span>${x}</span>`).join('')}</div><div class="track t1"></div><div class="track t2"></div><div class="finish"></div><div class="racer r1" id="racer1">🧍‍♂️</div><div class="racer r2" id="racer2">🧍‍♂️</div></div><div class="game-status"><h2 id="gameTitle">Siap memulai balap karung?</h2><p class="muted" id="gameText">Setiap permainan menggunakan 1 tiket.</p><button class="btn success" id="startRace">MULAI BALAPAN</button></div></section></main><div class="result-modal hidden" id="resultModal"><div class="card result-box"><div style="font-size:64px">🏆</div><h2>HASIL PERMAINAN</h2><p class="muted" id="winnerText"></p><div class="prize-value" id="prizeText"></div><button class="btn full" id="playAgain">MAIN LAGI</button><button class="btn secondary full" id="backMember" style="margin-top:9px">KEMBALI KE MEMBER</button></div></div>`;
    qs('#exitGame').onclick=()=>{saveSession(null);location.hash='member'};qs('#startRace').onclick=startRace;qs('#playAgain').onclick=()=>{qs('#resultModal').classList.add('hidden');resetRace()};qs('#backMember').onclick=()=>{saveSession(null);location.hash='member'};
  }
  let raceTimer=null;
  function resetRace(){const r1=qs('#racer1'),r2=qs('#racer2');if(r1){r1.style.transform='translateX(0)';r2.style.transform='translateX(0)';r1.classList.remove('running');r2.classList.remove('running');qs('#gameTitle').textContent='Siap memulai balap karung?';qs('#gameText').textContent='Setiap permainan menggunakan 1 tiket.';qs('#startRace').disabled=false}}
  function startRace(){
    const m=state.members.find(x=>x.id===session.id);if(!m||m.tickets<=0){toast('Tiket sudah habis.','error');return}const game=state.games.find(x=>x.id===m.gameId);const prizes=state.prizes.filter(p=>p.gameId===m.gameId&&p.quota>0&&p.weight>0);if(!prizes.length){toast('Hadiah aktif belum tersedia.','error');return}m.tickets-=1;qs('#ticketCount').textContent=m.tickets;qs('#startRace').disabled=true;qs('#gameTitle').textContent='BALAPAN DIMULAI!';qs('#gameText').textContent='Peserta sedang melompat menuju garis finis...';const r1=qs('#racer1'),r2=qs('#racer2');r1.classList.add('running');r2.classList.add('running');let p1=0,p2=0,ticks=0;const arena=qs('.arena'),max=Math.max(220,arena.clientWidth-145);clearInterval(raceTimer);raceTimer=setInterval(()=>{ticks++;p1+=Math.random()*18+7;p2+=Math.random()*18+7;r1.style.transform=`translateX(${Math.min(p1,max)}px)`;r2.style.transform=`translateX(${Math.min(p2,max)}px)`;if(ticks>60||p1>=max||p2>=max){clearInterval(raceTimer);r1.classList.remove('running');r2.classList.remove('running');finishRace(m,game,weightedPick(prizes),p1>=p2?'Peserta Ungu':'Peserta Emas')}} ,75)}
  function weightedPick(items){const total=items.reduce((a,x)=>a+Number(x.weight),0);let n=Math.random()*total;for(const x of items){n-=Number(x.weight);if(n<=0)return x}return items[items.length-1]}
  function finishRace(m,game,prize,winner){prize.quota=Math.max(0,prize.quota-1);if(prize.type==='Bonus Tiket')m.tickets+=Number(prize.value)||0;const w={id:uid(),userId:m.userId,memberId:m.id,gameName:game.name,prizeName:prize.name,value:prize.value,winner,createdAt:now()};state.winners.unshift(w);logActivity(`${m.userId} memenangkan ${prize.name}.`,'game',m.userId);saveState();qs('#ticketCount').textContent=m.tickets;qs('#winnerText').textContent=`${winner} mencapai garis finis lebih dulu. ${m.userId} mendapatkan:`;qs('#prizeText').textContent=prize.value?rupiah(prize.value):prize.name;qs('#resultModal').classList.remove('hidden')}

  route();
  </script>
</body>
</html>
