function renderDashboard(){if(!session||session.type!=='admin'||session.role!==PORTAL_MODE){saveSession(null);location.hash='';return}document.body.className='';const nav=navItems.filter(x=>permitted(x[3])).map(x=>`<button class="nav-btn ${currentPage===x[0]?'active':''}" data-page="${x[0]}"><span class="ico">${x[1]}</span>${x[2]}</button>`).join(''),dashRef=state.theme.dashboard.backgroundRef;qs('#app').innerHTML=`${dashRef?`<div class="dashboard-media">${assetTag(dashRef,state.theme.dashboard.backgroundType==='video'?'video':'image')}</div>`:''}<div class="app-shell"><aside class="sidebar" id="sidebar">${brandHTML('ADMIN CONTROL CENTER')}<div class="nav-scroll"><div class="nav-label">Platform</div>${nav}</div><div class="sidebar-bottom"><div class="profile-mini"><div class="avatar">${esc(initials(session.name))}</div><div class="truncate"><b>${esc(session.name)}</b><div class="muted small">${session.role==='super_admin'?'Super Admin':'Admin Kedua'}</div></div></div><button class="btn secondary full" id="logoutBtn" style="margin-top:13px">Logout</button></div></aside><main class="main"><header class="topbar"><div class="topbar-left grow"><button class="icon-btn mobile-only" id="menuBtn">☰</button><div class="search"><span>⌕</span><input class="input" id="globalSearch" placeholder="Cari member, asset, atau aktivitas..."></div></div><div class="topbar-right"><button class="btn secondary hide-mobile" id="memberLinkBtn">Buka Member</button><button class="icon-btn" id="refreshBtn">↻</button><div class="profile-mini hide-mobile"><div class="avatar">${esc(initials(session.name))}</div><div><b>${esc(session.name)}</b><div class="muted small">${session.role==='super_admin'?'Super Admin':'Admin Kedua'}</div></div></div></div></header><div class="content" id="pageHost"></div></main></div>`;bindShell();showPage(currentPage);hydrateAssets(qs('#app'));hideLoader()}
function bindShell(){qsa('[data-page]').forEach(b=>b.onclick=()=>{currentPage=b.dataset.page;qsa('[data-page]').forEach(x=>x.classList.toggle('active',x===b));showPage(currentPage);qs('#sidebar').classList.remove('open')});qs('#logoutBtn').onclick=()=>{logActivity('Logout dari dashboard.','logout');logAudit('LOGOUT',session.email);saveState();saveSession(null);location.hash=''};qs('#memberLinkBtn').onclick=()=>window.open(systemUrls().member,'_blank');qs('#refreshBtn').onclick=()=>showPage(currentPage);qs('#menuBtn')?.addEventListener('click',()=>qs('#sidebar').classList.toggle('open'));qs('#globalSearch').oninput=e=>{const q=e.target.value.toLowerCase();qsa('tbody tr,.asset-card').forEach(el=>el.style.display=el.textContent.toLowerCase().includes(q)?'':'none')}}

function showPage(page){const key=navItems.find(x=>x[0]===page)?.[3]||page;if(!permitted(key)){toast('Akses ditolak untuk role ini.','error');page='overview';currentPage='overview'}const fn=pages[page]||pages.overview;qs('#pageHost').innerHTML=fn();bindPage(page);hydrateAssets(qs('#pageHost'))}
function linkCard(icon,title,url){return `<div class="link-card"><div class="link-icon">${icon}</div><div class="link-main"><b>${title}</b><span>${esc(url)}</span></div><button class="chip" data-copy="${esc(url)}">Salin</button></div>`}
function activityList(arr){return arr.length?arr.map(a=>`<div class="link-card"><div class="link-icon">${a.type==='game'?'🎮':a.type==='login'?'🔑':a.type==='upload'?'☁':'◴'}</div><div class="link-main"><b>${esc(a.text)}</b><span>${esc(a.actor)} · ${fmtDate(a.createdAt)}</span></div></div>`).join(''):'<div class="muted">Belum ada aktivitas.</div>'}
function membersTable(){const rows=state.members.map(m=>`<tr><td><b>${esc(m.userId)}</b><div class="muted small">${esc(m.name||'-')}</div></td><td>${Number(m.tickets)||0}</td><td>${esc(state.games.find(g=>g.id===m.gameId)?.name||'-')}</td><td><span class="badge ${m.status==='active'?'active':'danger'}">${esc(m.status)}</span></td><td>${m.expiresAt?fmtDate(m.expiresAt):'Tanpa batas'}</td><td><div class="table-actions"><button class="chip" data-edit-member="${m.id}">Edit</button><button class="chip" data-ticket-member="${m.id}" data-delta="1">+1</button><button class="chip" data-ticket-member="${m.id}" data-delta="-1">-1</button><button class="chip danger" data-delete-member="${m.id}">Hapus</button></div></td></tr>`).join('');return table(['Member','Tiket','Game','Status','Expired','Aksi'],rows)}
function ticketsTable(){const rows=state.members.map(m=>`<tr><td><b>${esc(m.userId)}</b></td><td>${Number(m.tickets)||0}</td><td>${esc(state.games.find(g=>g.id===m.gameId)?.name||'-')}</td><td><div class="table-actions"><button class="chip" data-ticket-member="${m.id}" data-delta="1">+1</button><button class="chip" data-ticket-member="${m.id}" data-delta="5">+5</button><button class="chip" data-ticket-member="${m.id}" data-delta="-1">-1</button><button class="chip" data-set-ticket="${m.id}">Set</button></div></td></tr>`).join('');return table(['User ID','Tiket','Game','Ubah Tiket'],rows)}
function gameCard(g){const edit=hasFeature('manageGames')?`<div class="table-actions"><button class="chip" data-edit-game="${g.id}">Edit</button><button class="chip danger" data-delete-game="${g.id}">Hapus</button></div>`:'';return `<div class="card"><div class="card-head"><div><h3>${esc(g.name)}</h3><div class="muted small">${esc(g.code)} · ${esc(g.slug)}</div></div><span class="badge ${g.status==='active'?'active':g.status==='maintenance'?'warn':'danger'}">${esc(g.status)}</span></div><p class="muted">Limit harian: ${Number(g.dailyLimit)||'Tanpa batas'}</p>${edit}</div>`}
function prizesTable(){const rows=state.prizes.map(p=>`<tr><td><b>${esc(p.name)}</b><div class="muted small">${esc(p.type)}</div></td><td>${rupiah(p.value)}</td><td>${Number(p.quota)}</td><td>${Number(p.weight)}</td><td>${esc(state.games.find(g=>g.id===p.gameId)?.name||'-')}</td><td>${hasFeature('managePrizes')?`<div class="table-actions"><button class="chip" data-edit-prize="${p.id}">Edit</button><button class="chip danger" data-delete-prize="${p.id}">Hapus</button></div>`:'Read only'}</td></tr>`).join('');return table(['Hadiah','Nilai','Kuota','Bobot','Game','Aksi'],rows)}

function themeManagerPage(){themeDraft=deepClone(state.theme);const locked=session.role!=='super_admin'&&!hasFeature('changeMainLogo');return pageHead('Theme Manager','Kelola logo, warna, font, animasi, login background, dan preset theme.','<button class="btn" id="publishTheme">Publish Theme</button>')+`<div class="theme-layout"><div><div class="section-tabs"><button class="tab-btn active" data-tab="brand">Brand</button><button class="tab-btn" data-tab="visual">Visual System</button><button class="tab-btn" data-tab="logins">Login Backgrounds</button><button class="tab-btn" data-tab="presets">Theme Presets</button><button class="tab-btn" data-tab="history">History</button></div><div class="tab-panel active" data-panel="brand"><div class="card"><h3>Brand Identity</h3><div class="form-grid"><div class="field"><label>Nama Brand</label><input class="input theme-input" id="brandName" value="${esc(themeDraft.brandName)}"></div><div class="field"><label>Tagline</label><input class="input theme-input" id="brandTagline" value="${esc(themeDraft.brandTagline)}"></div><div class="field wide upload-zone"><label>Logo Utama</label><div class="field-help">PNG, JPG, SVG, atau WebP. Maksimal ${state.settings.maxImageMB} MB.</div><div class="asset-preview contain" id="logoPreview">${themeDraft.logoRef?assetTag(themeDraft.logoRef):'<span class="muted">Belum ada logo</span>'}</div><input type="hidden" id="logoRef" value="${esc(themeDraft.logoRef)}"><input type="file" id="logoUpload" accept=".png,.jpg,.jpeg,.svg,.webp,image/png,image/jpeg,image/svg+xml,image/webp" ${locked?'disabled':''}><div class="row wrap" style="margin-top:10px"><button class="btn secondary" type="button" id="removeLogo" ${locked?'disabled':''}>Hapus Logo</button><span class="badge ${locked?'warn':'active'}">${locked?'Dikunci Super Admin':'Dapat Diubah'}</span></div></div><div class="field wide upload-zone"><label>Favicon / Icon Brand</label><div class="asset-preview contain" id="faviconPreview">${themeDraft.faviconRef?assetTag(themeDraft.faviconRef):'<span class="muted">Belum ada favicon</span>'}</div><input type="hidden" id="faviconRef" value="${esc(themeDraft.faviconRef)}"><input type="file" id="faviconUpload" accept=".png,.jpg,.jpeg,.svg,.webp,image/*"></div></div></div></div><div class="tab-panel" data-panel="visual"><div class="card"><h3>Global Visual System</h3><div class="form-grid">${colorField('Primary','primary',themeDraft.primary)}${colorField('Secondary','secondary',themeDraft.secondary)}${colorField('Accent','accent',themeDraft.accent)}${colorField('Background','background',themeDraft.background)}${colorField('Panel','panel',themeDraft.panel)}${colorField('Text','text',themeDraft.text)}<div class="field"><label>Font</label><select class="select theme-input" id="font"><option ${themeDraft.font==='Inter'?'selected':''}>Inter</option><option ${themeDraft.font==='Poppins'?'selected':''}>Poppins</option><option ${themeDraft.font==='Montserrat'?'selected':''}>Montserrat</option><option ${themeDraft.font==='Orbitron'?'selected':''}>Orbitron</option></select></div><div class="field"><label>Efek Animasi</label><select class="select theme-input" id="animation"><option value="pulse" ${themeDraft.animation==='pulse'?'selected':''}>Pulse</option><option value="float" ${themeDraft.animation==='float'?'selected':''}>Floating</option><option value="none" ${themeDraft.animation==='none'?'selected':''}>Tanpa Animasi</option></select></div><label class="checkbox field wide"><input type="checkbox" id="loadingScreen" ${themeDraft.loadingScreen?'checked':''}> Aktifkan loading screen</label><div class="field wide"><label>Teks Loading</label><input class="input theme-input" id="loadingText" value="${esc(themeDraft.loadingText)}"></div><div class="field wide upload-zone"><label>Background Dashboard</label><div class="asset-preview" id="dashboardPreview">${themeDraft.dashboard.backgroundRef?assetTag(themeDraft.dashboard.backgroundRef,themeDraft.dashboard.backgroundType==='video'?'video':'image'):'<span class="muted">Belum ada background dashboard</span>'}</div><input type="hidden" id="dashboardRef" value="${esc(themeDraft.dashboard.backgroundRef)}"><select class="select" id="dashboardType"><option value="image" ${themeDraft.dashboard.backgroundType==='image'?'selected':''}>Gambar</option><option value="video" ${themeDraft.dashboard.backgroundType==='video'?'selected':''}>Video</option></select><input type="file" id="dashboardUpload" accept="image/*,video/mp4,video/webm"></div></div></div></div><div class="tab-panel" data-panel="logins">${['super_admin','admin_second','member'].map(portalEditor).join('')}</div><div class="tab-panel" data-panel="presets"><div class="card"><div class="card-head"><div><h3>Theme Presets</h3><div class="muted small">Simpan snapshot, terapkan kembali, atau hapus tema lama.</div></div><button class="btn secondary" id="savePreset">Simpan Snapshot</button></div><div class="grid two" style="margin-top:15px">${state.themes.map(themePresetCard).join('')}</div></div></div><div class="tab-panel" data-panel="history"><div class="card">${table(['Waktu','Action','Detail','Pelaku'],state.themeHistory.map(h=>`<tr><td>${fmtDate(h.createdAt)}</td><td><span class="badge">${esc(h.action)}</span></td><td>${esc(h.detail)}</td><td>${esc(h.actor)}</td></tr>`).join(''))}</div></div></div><div class="theme-preview"><div class="card"><div class="card-head"><div><h3>Live Preview</h3><div class="muted small">Preview sebelum dipublish.</div></div><span class="badge active">Realtime</span></div><div class="preview-frame" id="themePreview"></div></div></div></div></section>`}
function colorField(label,id,value){return `<div class="field"><label>${label}</label><div class="color-row"><input class="input theme-input" id="${id}" value="${esc(value)}"><input type="color" data-color="${id}" value="${esc(value)}"></div></div>`}
function portalEditor(key){const labels={super_admin:'Login Super Admin',admin_second:'Login Admin Kedua',member:'Login Member'},p=themeDraft.portal[key]||defaultPortal();return `<div class="card" style="margin-bottom:15px"><div class="card-head"><div><h3>${labels[key]}</h3><div class="muted small">Background dapat berbeda untuk setiap portal.</div></div><span class="badge">${key}</span></div><div class="form-grid"><div class="field"><label>Tipe Background</label><select class="select portal-field" data-portal="${key}" data-key="backgroundType"><option value="gradient" ${p.backgroundType==='gradient'?'selected':''}>Gradient Default</option><option value="image" ${p.backgroundType==='image'?'selected':''}>Gambar</option><option value="video" ${p.backgroundType==='video'?'selected':''}>Video</option></select></div><div class="field"><label>Posisi</label><select class="select portal-field" data-portal="${key}" data-key="position"><option value="center" ${p.position==='center'?'selected':''}>Center</option><option value="top" ${p.position==='top'?'selected':''}>Top</option><option value="bottom" ${p.position==='bottom'?'selected':''}>Bottom</option><option value="left" ${p.position==='left'?'selected':''}>Left</option><option value="right" ${p.position==='right'?'selected':''}>Right</option></select></div><div class="field"><label>Blur: <span id="blurVal-${key}">${p.blur}</span>px</label><input type="range" min="0" max="20" value="${p.blur}" class="portal-field" data-portal="${key}" data-key="blur"></div><div class="field"><label>Overlay Opacity: <span id="overlayVal-${key}">${p.overlayOpacity}</span></label><input type="range" min="0" max=".95" step=".05" value="${p.overlayOpacity}" class="portal-field" data-portal="${key}" data-key="overlayOpacity"></div><div class="field"><label>Overlay Color</label><input type="color" value="${esc(p.overlayColor)}" class="portal-field" data-portal="${key}" data-key="overlayColor"></div><label class="checkbox"><input type="checkbox" class="portal-check" data-portal="${key}" data-key="darkMode" ${p.darkMode?'checked':''}> Dark mode effect</label><div class="field wide upload-zone"><label>Upload Gambar</label><div class="asset-preview" id="portalImagePreview-${key}">${p.imageRef?assetTag(p.imageRef):'<span class="muted">Belum ada gambar</span>'}</div><input type="file" class="portal-upload" data-portal="${key}" data-kind="image" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"></div><div class="field wide upload-zone"><label>Upload Video</label><div class="asset-preview" id="portalVideoPreview-${key}">${p.videoRef?assetTag(p.videoRef,'video'):'<span class="muted">Belum ada video</span>'}</div><input type="file" class="portal-upload" data-portal="${key}" data-kind="video" accept=".mp4,.webm,video/mp4,video/webm"></div></div></div>`}
function themePresetCard(x){return `<div class="asset-card"><div class="asset-meta"><div class="card-head"><div><b>${esc(x.name)}</b><div class="muted tiny">${fmtDate(x.createdAt)} · ${esc(x.createdBy||'System')}</div></div><span class="badge ${state.theme.id===x.id?'active':''}">${state.theme.id===x.id?'Aktif':'Preset'}</span></div><div class="table-actions" style="margin-top:12px"><button class="chip" data-apply-theme="${x.id}">Terapkan</button>${x.id!=='theme-default'?`<button class="chip danger" data-delete-theme="${x.id}">Hapus</button>`:''}</div></div></div>`}
function frontCustomizerPage(){frontDraft=deepClone(state.theme.front);return pageHead('Game Front Page Customizer','Kelola background game, cinematic, banner event, logo game, bonus, hadiah, dan slider promo.','<button class="btn" id="publishFront">Publish Front Page</button>')+`<div class="theme-layout"><div><div class="card"><h3>Copy & Messaging</h3><div class="form-grid"><div class="field wide"><label>Judul Utama</label><input class="input front-input" id="frontTitle" value="${esc(frontDraft.title)}"></div><div class="field wide"><label>Subjudul</label><textarea class="front-input" id="frontSubtitle">${esc(frontDraft.subtitle)}</textarea></div><div class="field"><label>Teks Tombol</label><input class="input front-input" id="frontButton" value="${esc(frontDraft.buttonText)}"></div><div class="field"><label>Teks Berjalan</label><input class="input front-input" id="frontTicker" value="${esc(frontDraft.ticker)}"></div><div class="field"><label>Judul Event</label><input class="input front-input" id="eventTitle" value="${esc(frontDraft.eventTitle)}"></div><div class="field"><label>Deskripsi Event</label><input class="input front-input" id="eventText" value="${esc(frontDraft.eventText)}"></div><div class="field"><label>Judul Bonus</label><input class="input front-input" id="bonusTitle" value="${esc(frontDraft.bonusTitle)}"></div><div class="field"><label>Deskripsi Bonus</label><input class="input front-input" id="bonusText" value="${esc(frontDraft.bonusText)}"></div><div class="field"><label>Judul Promo</label><input class="input front-input" id="promoTitle" value="${esc(frontDraft.promoTitle)}"></div><div class="field"><label>Deskripsi Promo</label><input class="input front-input" id="promoText" value="${esc(frontDraft.promoText)}"></div></div></div><div class="card" style="margin-top:16px"><h3>Asset Game</h3><div class="grid two">${frontAssetUpload('bannerRef','Banner Event','image')}${frontAssetUpload('cinematicRef','Video Cinematic','video')}${frontAssetUpload('thumbnailRef','Thumbnail Game','image')}${frontAssetUpload('gameLogoRef','Logo Game','image')}${frontAssetUpload('gameBackgroundRef','Background Game','image')}${frontAssetUpload('prizeIconRef','Icon Hadiah','image')}${frontAssetUpload('bonusImageRef','Gambar Bonus','image')}</div><div class="divider"></div><h3>Slider Promo</h3><div class="grid three">${[0,1,2].map(i=>sliderUpload(i)).join('')}</div></div></div><div class="theme-preview"><div class="card"><div class="card-head"><div><h3>Member Front Preview</h3><div class="muted small">Asset dan copy tampil sebelum dipublish.</div></div><span class="badge active">Live</span></div><div class="preview-frame" id="frontPreview"></div></div></div></div></section>`}
function frontAssetUpload(key,label,kind){const ref=frontDraft[key]||'';return `<div class="upload-zone"><label>${label}</label><div class="asset-preview ${key.includes('Logo')||key.includes('Icon')?'contain':''}" id="frontPreview-${key}">${ref?assetTag(ref,kind):'<span class="muted">Belum ada asset</span>'}</div><input type="file" class="front-upload" data-key="${key}" data-kind="${kind}" accept="${kind==='video'?'.mp4,.webm,video/mp4,video/webm':'image/*,.svg'}"><button class="chip danger full" type="button" data-clear-front="${key}" style="margin-top:8px">Hapus Asset</button></div>`}
function sliderUpload(i){const ref=frontDraft.sliderRefs[i]||'';return `<div class="upload-zone"><label>Slider ${i+1}</label><div class="asset-preview" id="sliderPreview-${i}">${ref?assetTag(ref):'<span class="muted">Belum ada slider</span>'}</div><input type="file" class="slider-upload" data-index="${i}" accept="image/*"><button class="chip danger full" type="button" data-clear-slider="${i}" style="margin-top:8px">Hapus</button></div>`}
function assetLibraryPage(){const cards=state.uploads.map(u=>`<div class="asset-card"><div class="asset-thumb">${u.type==='video'?assetTag('asset:'+u.id,'video'):assetTag('asset:'+u.id)}</div><div class="asset-meta"><b class="truncate" title="${esc(u.fileName)}">${esc(u.fileName)}</b><div class="muted tiny">${esc(u.mime)} · ${byteSize(u.size)}</div><div class="muted tiny">Uploader: ${esc(u.uploader)} · ${fmtDate(u.createdDate)}</div><div class="tiny mono truncate" style="margin-top:5px">SHA-256: ${esc(u.hash||'-')}</div><div class="table-actions" style="margin-top:10px"><button class="chip" data-copy-ref="asset:${u.id}">Salin Ref</button>${session.role==='super_admin'||hasFeature('deleteAssets')?`<button class="chip danger" data-delete-asset="${u.id}">Hapus</button>`:''}</div></div></div>`).join('');return pageHead('Asset Library','Daftar file tervalidasi, metadata upload, hash, uploader, dan permission.','<button class="btn secondary" id="cleanupUnused">Bersihkan Asset Tidak Terpakai</button>')+`<div class="stats"><div class="stat"><span>Total Asset</span><strong>${state.uploads.length}</strong></div><div class="stat"><span>Gambar</span><strong>${state.uploads.filter(x=>x.type==='image').length}</strong></div><div class="stat"><span>Video</span><strong>${state.uploads.filter(x=>x.type==='video').length}</strong></div><div class="stat"><span>Total Ukuran</span><strong style="font-size:1.35rem">${byteSize(state.uploads.reduce((a,x)=>a+x.size,0))}</strong></div></div><div class="grid three" style="margin-top:16px">${cards||'<div class="card muted">Belum ada asset upload.</div>'}</div></section>`}
function permissionPage(){const menuItems=navItems.filter(x=>!['admins','permissions','settings','audit'].includes(x[0]));const features=[['manageGames','Mengatur Game'],['managePrizes','Mengatur Hadiah'],['uploadAssets','Upload Asset'],['changeMainLogo','Mengganti Logo Utama'],['publishTheme','Publish Theme'],['deleteAssets','Menghapus Asset'],['manageMemberBranding','Mengatur Branding Member']];return pageHead('Permission Management','Atur akses menu dan fitur sensitif Admin Kedua.','<button class="btn" id="savePermissions">Simpan Permission</button>')+`<div class="card"><h3>Akses Menu</h3><div class="permission-grid">${menuItems.map(x=>`<label class="permission-item checkbox"><input type="checkbox" value="${x[3]}" class="permCheck" ${state.permissions.admin_second.menus.includes(x[3])?'checked':''}> ${x[1]} ${x[2]}</label>`).join('')}</div><div class="divider"></div><h3>Permission Fitur</h3><div class="permission-grid">${features.map(([k,l])=>`<label class="permission-item checkbox"><input type="checkbox" value="${k}" class="featureCheck" ${state.permissions.admin_second.features[k]?'checked':''}> ${l}</label>`).join('')}</div><div class="notice warning" style="margin-top:18px">Mengganti logo utama, publish theme, dan menghapus asset sebaiknya hanya diberikan kepada admin tepercaya.</div></div></section>`}
function settingsPage(){return pageHead('System Settings','Atur timezone, maintenance, keamanan upload, backup, dan reset.')+`<div class="grid two"><div class="card"><form id="settingsForm" class="form-grid"><div class="field"><label>Timezone</label><select class="select" id="settingTimezone"><option ${state.settings.timezone==='Asia/Jakarta'?'selected':''}>Asia/Jakarta</option><option ${state.settings.timezone==='Asia/Phnom_Penh'?'selected':''}>Asia/Phnom_Penh</option><option ${state.settings.timezone==='UTC'?'selected':''}>UTC</option></select></div><div class="field"><label>Maintenance</label><select class="select" id="settingMaintenance"><option value="false" ${!state.settings.maintenance?'selected':''}>Off</option><option value="true" ${state.settings.maintenance?'selected':''}>On</option></select></div><div class="field wide"><label>Pesan Maintenance</label><input class="input" id="settingMessage" value="${esc(state.settings.maintenanceMessage)}"></div><div class="field"><label>Limit Gambar (MB)</label><input class="input" id="maxImageMB" type="number" min="1" max="10" value="${state.settings.maxImageMB}"></div><div class="field"><label>Limit Video (MB)</label><input class="input" id="maxVideoMB" type="number" min="2" max="50" value="${state.settings.maxVideoMB}"></div><div class="field"><label>Session Login (menit)</label><input class="input" id="sessionMinutes" type="number" min="15" max="1440" value="${state.settings.sessionMinutes}"></div><label class="checkbox"><input type="checkbox" id="brandLocked" ${state.settings.brandLocked?'checked':''}> Kunci logo utama untuk Admin Kedua</label><div class="form-actions"><button class="btn">SIMPAN SETTINGS</button></div></form></div><div class="card"><h3>Backup & Recovery</h3><div class="stack"><button class="btn secondary" id="exportData">Export Konfigurasi JSON</button><label class="btn secondary" style="text-align:center">Import Konfigurasi JSON<input type="file" id="importData" accept="application/json" hidden></label><button class="btn secondary" id="backupTheme">Backup Theme Aktif</button><button class="btn danger" id="resetAll">RESET SELURUH DATA DEMO</button></div><div class="notice warning" style="margin-top:14px">Static GitHub Pages menyimpan data per browser. Untuk multi-device dan keamanan produksi, gunakan backend + database + object storage.</div></div></div></section>`}
function bindPage(page){qsa('[data-go]').forEach(b=>b.onclick=()=>{currentPage=b.dataset.go;qsa('[data-page]').forEach(x=>x.classList.toggle('active',x.dataset.page===currentPage));showPage(currentPage)});qsa('[data-copy]').forEach(b=>b.onclick=async()=>{try{await navigator.clipboard.writeText(b.dataset.copy);toast('Link berhasil disalin.','success')}catch{toast('Salin manual dari kolom link.','error')}});bindCommonActions();if(page==='members')bindMembers();if(page==='games'&&hasFeature('manageGames'))bindGames();if(page==='prizes'&&hasFeature('managePrizes'))bindPrizes();if(page==='raceconfig')bindRaceConfig();if(page==='theme')bindThemeManager();if(page==='front')bindFrontCustomizer();if(page==='uploads')bindAssetLibrary();if(page==='admins')bindAdmins();if(page==='permissions')bindPermissions();if(page==='settings')bindSettings();if(page==='account')bindAccount()}
function bindCommonActions(){qsa('[data-ticket-member]').forEach(b=>b.onclick=()=>changeTicket(b.dataset.ticketMember,Number(b.dataset.delta)));qsa('[data-set-ticket]').forEach(b=>b.onclick=()=>{const m=state.members.find(x=>x.id===b.dataset.setTicket),n=prompt('Masukkan jumlah tiket baru:',m.tickets);if(n!==null&&!Number.isNaN(Number(n))){const old=m.tickets;m.tickets=Math.max(0,Number(n));logActivity(`Tiket ${m.userId} diubah dari ${old} menjadi ${m.tickets}.`,'ticket');logAudit('SET_TICKET',`${m.userId}: ${old} -> ${m.tickets}`);saveState();showPage(currentPage)}})}
function changeTicket(id,delta){const m=state.members.find(x=>x.id===id);if(!m)return;const old=Number(m.tickets)||0;m.tickets=Math.max(0,old+delta);logActivity(`Tiket ${m.userId} ${delta>=0?'ditambah':'dikurangi'} ${Math.abs(delta)}.`,'ticket');logAudit('UPDATE_TICKET',`${m.userId}: ${old} -> ${m.tickets}`);saveState();showPage(currentPage)}
function bindMembers(){qs('#memberForm').onsubmit=e=>{e.preventDefault();const id=qs('#memberId').value,userId=qs('#memberUserId').value.trim().toUpperCase();if(state.members.some(m=>m.userId===userId&&m.id!==id)){toast('User ID sudah digunakan.','error');return}const data={userId,name:qs('#memberName').value.trim(),gameId:qs('#memberGame').value,tickets:Math.max(0,Number(qs('#memberTickets').value)),status:qs('#memberStatus').value,expiresAt:qs('#memberExpires').value?new Date(qs('#memberExpires').value).toISOString():'',notes:qs('#memberNotes').value.trim()};if(id)Object.assign(state.members.find(m=>m.id===id),data);else state.members.push({id:uid(),createdAt:now(),...data});logActivity(`${id?'Member diperbarui':'Member dibuat'}: ${userId}.`,'member');logAudit(id?'UPDATE_MEMBER':'CREATE_MEMBER',userId);saveState();showPage('members');toast('Data member berhasil disimpan.','success')};qsa('[data-edit-member]').forEach(b=>b.onclick=()=>{const m=state.members.find(x=>x.id===b.dataset.editMember);qs('#memberId').value=m.id;qs('#memberUserId').value=m.userId;qs('#memberName').value=m.name;qs('#memberGame').value=m.gameId;qs('#memberTickets').value=m.tickets;qs('#memberStatus').value=m.status;qs('#memberExpires').value=m.expiresAt?new Date(m.expiresAt).toISOString().slice(0,16):'';qs('#memberNotes').value=m.notes||'';scrollTo({top:0,behavior:'smooth'})});qsa('[data-delete-member]').forEach(b=>b.onclick=()=>{const m=state.members.find(x=>x.id===b.dataset.deleteMember);if(confirm(`Hapus member ${m.userId}?`)){state.members=state.members.filter(x=>x.id!==m.id);logAudit('DELETE_MEMBER',m.userId);saveState();showPage('members')}})}
function bindGames(){qs('#gameForm').onsubmit=e=>{e.preventDefault();const id=qs('#gameId').value,data={name:qs('#gameName').value.trim(),code:qs('#gameCode').value.trim().toUpperCase(),slug:qs('#gameSlug').value.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-'),status:qs('#gameStatus').value,dailyLimit:Math.max(0,Number(qs('#gameLimit').value))};if(id)Object.assign(state.games.find(g=>g.id===id),data);else state.games.push({id:uid(),...data,startAt:'',endAt:''});logAudit(id?'UPDATE_GAME':'CREATE_GAME',data.name);saveState();showPage('games');toast('Game berhasil disimpan.','success')};qsa('[data-edit-game]').forEach(b=>b.onclick=()=>{const g=state.games.find(x=>x.id===b.dataset.editGame);qs('#gameId').value=g.id;qs('#gameName').value=g.name;qs('#gameCode').value=g.code;qs('#gameSlug').value=g.slug;qs('#gameStatus').value=g.status;qs('#gameLimit').value=g.dailyLimit;scrollTo({top:0,behavior:'smooth'})});qsa('[data-delete-game]').forEach(b=>b.onclick=()=>{const g=state.games.find(x=>x.id===b.dataset.deleteGame);if(state.games.length===1){toast('Minimal harus ada satu game.','error');return}if(confirm(`Hapus game ${g.name}?`)){state.games=state.games.filter(x=>x.id!==g.id);state.members.forEach(m=>{if(m.gameId===g.id)m.gameId=state.games[0].id});state.prizes=state.prizes.filter(p=>p.gameId!==g.id);logAudit('DELETE_GAME',g.name);saveState();showPage('games')}})}
function bindPrizes(){qs('#prizeForm').onsubmit=e=>{e.preventDefault();const id=qs('#prizeId').value,data={gameId:qs('#prizeGame').value,name:qs('#prizeName').value.trim(),type:qs('#prizeType').value,value:Math.max(0,Number(qs('#prizeValue').value)),quota:Math.max(0,Number(qs('#prizeQuota').value)),weight:Math.max(0,Number(qs('#prizeWeight').value))};if(id)Object.assign(state.prizes.find(p=>p.id===id),data);else state.prizes.push({id:uid(),...data});logAudit(id?'UPDATE_PRIZE':'CREATE_PRIZE',data.name);saveState();showPage('prizes');toast('Hadiah berhasil disimpan.','success')};qsa('[data-edit-prize]').forEach(b=>b.onclick=()=>{const p=state.prizes.find(x=>x.id===b.dataset.editPrize);qs('#prizeId').value=p.id;qs('#prizeGame').value=p.gameId;qs('#prizeName').value=p.name;qs('#prizeType').value=p.type;qs('#prizeValue').value=p.value;qs('#prizeQuota').value=p.quota;qs('#prizeWeight').value=p.weight;scrollTo({top:0,behavior:'smooth'})});qsa('[data-delete-prize]').forEach(b=>b.onclick=()=>{const p=state.prizes.find(x=>x.id===b.dataset.deletePrize);if(confirm(`Hapus hadiah ${p.name}?`)){state.prizes=state.prizes.filter(x=>x.id!==p.id);logAudit('DELETE_PRIZE',p.name);saveState();showPage('prizes')}})}
async function validateAndStore(file,kind,permission='theme_asset'){if(!file)throw Error('File belum dipilih.');if(session?.role!=='super_admin'&&!hasFeature('uploadAssets'))throw Error('Permission upload asset belum diberikan.');const ext=(file.name.split('.').pop()||'').toLowerCase(),imageExt=['png','jpg','jpeg','svg','webp'],videoExt=['mp4','webm'],max=(kind==='video'?state.settings.maxVideoMB:state.settings.maxImageMB)*1024*1024;if(file.size>max)throw Error(`Ukuran file melebihi batas ${kind==='video'?state.settings.maxVideoMB:state.settings.maxImageMB} MB.`);if(kind==='video'&&!videoExt.includes(ext))throw Error('Format video hanya MP4 atau WebM.');if(kind==='image'&&!imageExt.includes(ext))throw Error('Format gambar hanya PNG, JPG, SVG, atau WebP.');let blob=file;if(ext==='svg'){let text=await file.text();if(/<script|javascript:|on\w+\s*=|<foreignObject|<iframe|<object|<embed/i.test(text))throw Error('SVG mengandung elemen atau script berbahaya.');text=text.replace(/<!--([\s\S]*?)-->/g,'');blob=new Blob([text],{type:'image/svg+xml'})}const buffer=await blob.arrayBuffer(),hash=await digestHex(buffer),id=uid(),mime=blob.type||(kind==='video'?'video/'+ext:'image/'+ext);await putAsset({id,blob,mime,fileName:file.name,createdDate:now()});const meta={id,fileName:file.name,fileType:ext,type:kind,mime,size:blob.size,uploader:session?.name||'System',permission,createdDate:now(),hash};state.uploads.unshift(meta);logActivity(`Asset ${file.name} diupload.`,'upload');logAudit('UPLOAD_ASSET',`${file.name} · ${mime} · ${byteSize(blob.size)}`);saveState();return'asset:'+id}

function resetRace(){raceActive=false;racePositions=[0,0,0,0];boosts=0;qs('#selectionPanel')?.classList.remove('hidden');qs('#raceArena')?.classList.add('hidden');qs('#raceHud')?.classList.add('hidden');qs('#gameTitle').textContent='Pilih karakter untuk tiket berikutnya';qs('#gameText').textContent='Tekan boost berkali-kali agar menang.'}

function startRace(){const m=state.members.find(x=>x.id===session.id);if(!m||m.tickets<=0){toast('Tiket sudah habis. Hubungi Admin.','error');return}m.tickets--;saveState();qs('#ticketCount').textContent=m.tickets;qs('#selectionPanel').classList.add('hidden');qs('#raceArena').classList.remove('hidden');qs('#raceHud').classList.remove('hidden');qs(`#raceAvatar${selectedRacer}`).classList.add('player','camera-focus');raceActive=true;boosts=0;racePositions=[0,0,0,0];raceStartAt=performance.now();const duration=(Number(state.raceConfig.duration)||12)*1000,max=Math.max(250,qs('#raceArena').clientWidth-145);clearInterval(raceTimer);raceTimer=setInterval(()=>{const elapsed=performance.now()-raceStartAt,remain=Math.max(0,duration-elapsed);qs('#raceClock').textContent=(remain/1000).toFixed(1);for(let i=0;i<4;i++){if(i!==selectedRacer)racePositions[i]+=.62+Math.random()*.48;const pos=Math.min(max,racePositions[i]/100*max);qs(`#raceAvatar${i}`).style.transform=`translateX(${pos}px) scale(${i===selectedRacer?1.1:1})`}if(remain<=0){clearInterval(raceTimer);raceActive=false;const winner=racePositions.indexOf(Math.max(...racePositions)),won=winner===selectedRacer&&boosts>=state.raceConfig.minBoosts;finishRace(m,state.games.find(x=>x.id===m.gameId),won,winner)}},80)}

/* ===== GOOGLE SHEETS REALTIME RACE HISTORY =====
   Setelah Code.gs dideploy, ganti URL di bawah dengan URL Web App /exec. */
const RACE_API_URL='PASTE_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';
const RACE_API_TOKEN='GANTI_DENGAN_TOKEN_RAHASIA_YANG_SAMA';
let remoteRaceHistory=[];
function raceApiReady(){return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec/.test(RACE_API_URL)}
async function raceApi(action,data={}){
  if(!raceApiReady())throw new Error('URL Google Apps Script belum dipasang.');
  const url=new URL(RACE_API_URL);url.searchParams.set('action',action);url.searchParams.set('token',RACE_API_TOKEN);url.searchParams.set('_',Date.now());
  Object.entries(data).forEach(([k,v])=>url.searchParams.set(k,String(v??'')));
  const res=await fetch(url.toString(),{method:'GET',redirect:'follow',cache:'no-store'});
  if(!res.ok)throw new Error('API Spreadsheet tidak dapat diakses.');
  const json=await res.json();if(json.success===false)throw new Error(json.message||'Proses Spreadsheet gagal.');return json;
}
function winnersTable(){
  const source=remoteRaceHistory.length?remoteRaceHistory:state.winners;
  const rows=source.map((w,i)=>`<tr><td>${esc(w.no||i+1)}</td><td>${fmtDate(w.tgl||w.createdAt)}</td><td><b>${esc(w.userId||'-')}</b></td><td>${esc(w.tiket??1)}</td><td>${esc(w.sisaTiket??'-')}</td><td>${esc(w.jenisHadiah||w.prizeName||'-')}</td><td>${rupiah(Number(w.nominalBonus??w.value)||0)}</td><td><span class="badge ${String(w.ket||w.status||'').includes('MENANG')?'active':'danger'}">${esc(w.ket||w.status||'-')}</span></td></tr>`).join('');
  return table(['NO','TGL','USER ID','TIKET','SISA TIKET','JENIS HADIAH','NOMINAL BONUS','KET'],rows);
}
async function refreshRaceHistory(){
  if(!raceApiReady())return;
  try{const json=await raceApi('getRaceHistory',{limit:1000});remoteRaceHistory=Array.isArray(json.data)?json.data:[];if(currentPage==='winners'&&session?.type==='admin')showPage('winners')}
  catch(err){console.error('Sinkronisasi history:',err)}
}
